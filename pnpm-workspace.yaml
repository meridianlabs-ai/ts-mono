packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"

# Require a 7-day soak before pnpm will resolve a newly published version.
# Mitigates supply-chain attacks where a compromised release is detected and
# yanked within days. pnpm 11 enables a 1-day floor by default; this is
# stricter and aligns with current public guidance.
minimumReleaseAge: 10080

# Exempt specific security-patch releases from the soak window. These are
# pulled in deliberately to resolve Dependabot advisories before the version
# has aged 7 days; the advisory fix is the reason we want them early.
minimumReleaseAgeExclude:
  - dompurify
  # TypeScript 7.0 (native compiler) adoption: typescript@7.0.2, its
  # @typescript/typescript-* platform binaries, and the @typescript/typescript6
  # JS-API compatibility package were all published within the soak window.
  # Publisher is Microsoft's TypeScript team. Remove after 2026-07-15.
  - typescript
  - "@typescript/typescript6"
  - "@typescript/typescript-*"
