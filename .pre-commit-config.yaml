# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: pnpm-format
        name: pnpm format
        entry: pnpm format
        language: system
        pass_filenames: false
        always_run: true
      - id: pnpm-check
        name: pnpm check
        entry: pnpm check
        language: system
        pass_filenames: false
        always_run: true
